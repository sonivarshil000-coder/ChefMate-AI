<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ChefMate AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/ai_home.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">


</head>

<body>

    <nav>

        <div class="logo">

            👨‍🍳 ChefMate AI

        </div>

        <div class="user">

            👤 {{ session['user'] }}

        </div>

    </nav>

    <div class="container">

        <div class="hero">

            <h1>

                Welcome Back, {{ session['user'] }} 👋

            </h1>

            <p>

                Your Personal AI Kitchen Assistant

            </p>

        </div>

        <form action="{{ url_for('chat') }}" method="POST" class="search-box">
        
            <input type="text" name="message" placeholder="What would you like to cook today?" required>
        
            <button type="submit">
        
                Find Recipe
        
            </button>
        
        </form>
        <div class="quick">

            <h2>Quick Suggestions</h2>

            <div class="chips">

                <button class="chip">🥗 Healthy Breakfast</button>

                <button class="chip">🍕 Pizza</button>

                <button class="chip">🍝 Pasta</button>

                <button class="chip">🥘 Indian Food</button>

                <button class="chip">🥗 Weight Loss Meal</button>

                <button class="chip">🍚 Gujarati Food</button>

            </div>

        </div>

    </div>

</body>

</html>
